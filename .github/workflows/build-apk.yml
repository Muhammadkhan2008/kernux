name: Build Kernux APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # CRITICAL: NDK install karna zaroori hai kyunki CMake se native PTY build hoti hai.
      # android-actions/setup-android@v3 sirf SDK install karta hai — NDK alag se install karna padta hai.
      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          sdk-platform-tools: true
          build-tools: 34.0.0
          platforms: android-34
          ndk-version: 25.2.9519653
          cmake-version: 3.22.1
          add-to-path: true

      - name: Accept Android licenses
        run: |
          yes | "$ANDROID_HOME/tools/bin/sdkmanager" --licenses || true
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Show build env
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la "$ANDROID_NDK_HOME" 2>/dev/null || echo "NDK dir not found"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'
          cache-disabled: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace --no-daemon || echo "Release build skipped (no signing config — that's fine for testing)"

      - name: List all built APKs
        run: |
          echo "=== APK files found ==="
          find . -name "*.apk" -type f 2>/dev/null | head -20
          echo "========================"

      # IMPORTANT: 'error' (not 'warn') — agar APK nahi bana toh workflow FAIL hoga.
      # Pehle 'warn' tha, jiski wajah se build fail hote hue bhi green tick aa raha tha.
      - name: Upload Debug APK artifact
        if: hashFiles('app/build/outputs/apk/debug/app-debug.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: kernux-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release APK artifact
        if: hashFiles('app/build/outputs/apk/release/*.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: kernux-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Create Release (on tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Kernux ${{ github.ref }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/app-debug.apk
