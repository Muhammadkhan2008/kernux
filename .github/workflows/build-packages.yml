name: Build Kernux Packages

on:
  schedule:
    - cron: '0 0 1 * *'  # Monthly
  workflow_dispatch:     # Manual trigger

jobs:
  build-packages:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Download Android NDK r25b
        run: |
          cd ~
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip -q android-ndk-r25b-linux.zip
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-r25b" >> $GITHUB_ENV
          export PATH=$HOME/android-ndk-r25b/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
      
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git wget curl tar gzip
      
      - name: Build all packages
        run: |
          export ANDROID_NDK_HOME=$HOME/android-ndk-r25b
          export PATH=$HOME/android-ndk-r25b/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          cd $GITHUB_WORKSPACE/phase2-build/scripts
          chmod +x build-all-packages.sh
          timeout 120h bash build-all-packages.sh 2>&1 | tee build.log
      
      - name: Create release with packages
        uses: softprops/action-gh-release@v1
        with:
          tag_name: packages-${{ github.run_number }}
          name: Kernux Packages Build ${{ github.run_number }}
          body: |
            Automated build of all 16 packages for Kernux
            
            Packages:
            - coreutils, bash, curl, wget, git, vim, nano
            - python, node, gcc, openssh, perl, openssl
            - net-tools, iputils, make
            
            Build timestamp: ${{ github.event.head_commit.timestamp }}
          files: $GITHUB_WORKSPACE/phase2-build/packages/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
